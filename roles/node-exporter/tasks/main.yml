- name: Set and Validate node_exporter architecture
  ansible.builtin.set_fact:
    host_arch: "{{ ansible_architecture }}"
    host_arch_alias: >-
      {{
        {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_architecture] | default('unsupported')
      }}

- name: Fail if unsupported
  ansible.builtin.fail:
    msg: "Unsupported architecture: {{ ansible_architecture }}"
  when: host_arch_alias == 'unsupported'

- name: Download node_exporter binary to host
  ansible.builtin.get_url:
    url: "{{ download_ase_url }}/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ host_arch_alias }}.tar.gz"
    dest: "/tmp/node_exporter.tar.gz"
    mode: '0644'
  when: online_install

- name: Extract node_exporter binary
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter.tar.gz"
    dest: "{{ bin_dir }}/"
    mode: '0755'
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "--no-same-owner"
      - "--wildcards"
      - "*/node_exporter"
  when: online_install

- name: Copy node_exporter binary to host
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/packages/node-exporter/{{ host_arch }}/node_exporter"
    dest: "{{ bin_dir }}/node_exporter"
    mode: "0755"
  when: not online_install

- name: Enable Smart
  ansible.builtin.include_tasks: enable_smart.yaml
  when: node_exporter_smart | default(false)

- name: Create systemd file for node_exporter
  ansible.builtin.template:
    src: node-exporter.service.j2
    dest: /etc/systemd/system/node-exporter.service
    mode: '0644'

- name: Systemctl daemon_reload
  ansible.builtin.systemd:
    name: node-exporter
    state: stopped
    daemon_reload: true
  failed_when: false

- name: Ensure node_exporter is running and enabled
  ansible.builtin.systemd:
    name: node-exporter
    state: started
    enabled: true
